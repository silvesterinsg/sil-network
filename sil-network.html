<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const APPS_SCRIPT_URL  = 'https://script.google.com/macros/s/AKfycbxE1K9K4KpkW6nsBnuc5KvAWtLkml9RXJVA8QTga9BzvzorB9ondpJXtsoxzyjc1MHbgQ/exec?token=silnetwork2024sc';
const APPS_SCRIPT_POST = 'https://script.google.com/macros/s/AKfycbxE1K9K4KpkW6nsBnuc5KvAWtLkml9RXJVA8QTga9BzvzorB9ondpJXtsoxzyjc1MHbgQ/exec';
const TOKEN = 'silnetwork2024sc';

// ── POST to Apps Script (write) ─────────────────────────────────────────
async function postToSheet(payload) {
  payload.token = TOKEN;
  try {
    const r = await fetch(APPS_SCRIPT_POST, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    return await r.json();
  } catch(e) {
    console.warn('Post failed (offline?), cached locally:', e);
    return { ok: false, error: e.message };
  }
}
let lastSyncTime = null;

// ── DATA ──────────────────────────────────────────────────────────────────
let CLIENTS_DATA = [];
let POLICIES_DATA = [];
let COLLABS_DATA = [];
let CIMB_DATA = []; // loaded from Google Sheet CIMB_Pipeline tab
let INTERACTIONS_DATA = []; // touchpoints — synced from Interactions sheet

// Non-CIMB phone contacts (671) — imported from synced contacts
// These are NOT clients yet. Hints show likely network cluster.
// cat: Industry/NS/Church/Family/Uncategorised | hint: location/network tags

// ── STATE ──────────────────────────────────────────────────────────────────
let followedUp = JSON.parse(localStorage.getItem('sil_followedup') || '{}');
let clientFilter = 'All', polFilter = 'All', collabFilter = 'All';
let clientSearch = '', polSearch = '', collabSearch = '';

// ── HELPERS ────────────────────────────────────────────────────────────────
const fmt = n => 'SGD ' + Math.round(n).toLocaleString('en-SG');
const fmtK = n => n >= 1000000 ? (n/1000000).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(0)+'K' : Math.round(n).toString();

function daysUntilBday(dob) {
  if (!dob) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const b = new Date(dob);
  let next = new Date(today.getFullYear(), b.getMonth(), b.getDate());
  if (next < today) next.setFullYear(today.getFullYear() + 1);
  return Math.round((next - today) / 86400000);
}

function cgDate(inception) {
  const d = new Date(inception);
  try { return new Date(d.getFullYear()+3, d.getMonth(), d.getDate()); }
  catch { return new Date(d.getFullYear()+3, d.getMonth(), 28); }
}

function nextPremiumDate(inception, freq) {
  if (!inception || freq === 'Single') return null;
  const inc = new Date(inception); inc.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  let d = new Date(inc);
  while (d <= today) {
    if (freq === 'Yearly') d.setFullYear(d.getFullYear()+1);
    else if (freq === 'Monthly') d.setMonth(d.getMonth()+1);
    else break;
  }
  return d;
}

function isFullyPaid(p) {
  if (p.freq === 'Single') return true;
  if (!p.maxPay) return false;
  const inc = new Date(p.inception);
  const today = new Date();
  let paid = 0, d = new Date(inc);
  while (d <= today) { paid++; d.setFullYear(d.getFullYear()+1); }
  return paid >= p.maxPay;
}

function catColor(cat) {
  return cat==='C1'?'var(--purple)':cat==='C2'?'var(--teal)':cat==='C3'?'var(--amber)':'var(--muted)';
}
function insurerColor(ins) {
  return ins==='Singlife'?'var(--teal)':ins==='Income'?'var(--amber)':ins==='FWD'?'var(--red)':ins==='Manulife'?'var(--purple)':'var(--blue)';
}
function tag(label, color) {
  return `<span class="tag" style="color:${color};border-color:${color}44;background:${color}15">${label}</span>`;
}

// ── SYNC FROM GOOGLE APPS SCRIPT ─────────────────────────────────────────
async function syncData() {
  const el = document.getElementById('syncStatus');
  el.innerHTML = '↻ Syncing...';
  el.style.color = 'var(--amber)';
  try {
    const r = await fetch(APPS_SCRIPT_URL);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const raw = await r.json();
    if (raw === 'Unauthorised') throw new Error('Token rejected');
    parseSheetData(raw);
    lastSyncTime = new Date();
    el.innerHTML = '✓ ' + lastSyncTime.toLocaleTimeString('en-SG',{hour:'2-digit',minute:'2-digit'});
    el.style.color = 'var(--green)';
    renderTab(document.querySelector('.nav-btn.active')?.getAttribute('onclick')?.match(/'(\w+)'/)?.[1] || 'home');
  } catch(e) {
    el.innerHTML = '✗ ' + String(e.message).substring(0,25);
    el.style.color = 'var(--red)';
    console.error('Sync error:', e);
    showSyncError(e.message);
  }
}

function showSyncError(msg) {
  const homeTab = document.getElementById('tab-home');
  if (homeTab && homeTab.classList.contains('active')) {
    homeTab.innerHTML = `<div style="text-align:center;padding:40px 24px">
      <div style="font-size:32px;margin-bottom:12px">⚠️</div>
      <div style="color:var(--red);font-size:14px;font-weight:600;margin-bottom:8px">Sync Failed</div>
      <div style="color:var(--muted);font-size:12px;font-family:monospace;background:#0a1520;padding:10px;border-radius:6px;margin-bottom:16px;word-break:break-all;text-align:left">${msg}</div>
      <button class="action-btn btn-teal" onclick="syncData()">↻ Retry</button>
    </div>`;
  }
}

function parseSheetData(raw) {
    function parseDOB(val) {
      if (!val) return '';
      if (val instanceof Date) {
        const y = val.getFullYear(), m = String(val.getMonth()+1).padStart(2,'0'), d = String(val.getDate()).padStart(2,'0');
        return `${y}-${m}-${d}`;
      }
      const s = String(val).trim();
      // Already ISO format
      if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0,10);
      // DD/MM/YYYY or MM/DD/YYYY
      if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}/.test(s)) {
        const parts = s.split(/[\/\-]/);
        return `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
      }
      return s;
    }

    if (raw.clients && raw.clients.length > 3) {
      // Find first data row by looking for SC- prefix
      let dataStart = 3;
      for (let i = 0; i < Math.min(6, raw.clients.length); i++) {
        if (raw.clients[i][0] && String(raw.clients[i][0]).startsWith('SC-')) { dataStart = i; break; }
      }
      const rows = raw.clients.slice(dataStart).filter(r => r[0] && String(r[0]).startsWith('SC-'));
      CLIENTS_DATA.length = 0;
      rows.forEach(r => {
        CLIENTS_DATA.push({
          id:          String(r[0]).trim(),
          name:        String(r[1]||'').trim(),
          dob:         parseDOB(r[2]),
          age:         parseInt(r[3]) || null,
          gender:      String(r[4]||'').trim(),
          nationality: String(r[5]||'').trim(),
          mobile:      String(r[6]||'').replace(/\D/g,'').slice(-8),
          email:       String(r[7]||'').trim(),
          address:     String(r[8]||'').trim(),
          area:        String(r[9]||'').trim(),
          aum:         0,
          cat:         'C4',
          notes:       String(r[13]||'').trim(),
          lastContact: String(r[14]||'').trim(),
          nextAction:  String(r[15]||'').trim(),
          ig:          String(r[16]||'').trim(),
          fb:          String(r[17]||'').trim(),
          linkedin:    String(r[18]||'').trim(),
          wa:          String(r[19]||'').trim(),
        });
      });
    }

    if (raw.policies && raw.policies.length > 2) {
      let dataStart = 2;
      for (let i = 0; i < Math.min(5, raw.policies.length); i++) {
        const v = String(raw.policies[i][0]||'');
        if (v && !v.includes('NETWORK') && !v.includes('Policy ID') && v !== '') { dataStart = i; break; }
      }
      const rows = raw.policies.slice(dataStart).filter(r => r[0] && r[1] && !String(r[0]).includes('NETWORK'));
      POLICIES_DATA.length = 0;
      rows.forEach(r => {
        const maxP = String(r[12]).trim();
        POLICIES_DATA.push({
          polId:     String(r[0]).trim(),
          clientId:  String(r[1]).trim(),
          client:    String(r[2]||'').trim(),
          insurer:   String(r[3]||'').trim(),
          product:   String(r[4]||'').trim(),
          status:    String(r[5]||'').trim(),
          inception: parseDOB(r[6]),
          freq:      String(r[7]||'').trim(),
          ap:        parseFloat(String(r[8]||'0').replace(/[^0-9.]/g,'')) || 0,
          sa:        parseFloat(String(r[9]||'0').replace(/[^0-9.]/g,'')) || 0,
          maxPay:    /^\d+$/.test(maxP) ? parseInt(maxP) : null,
        });
      });
    }

    if (raw.collabs && raw.collabs.length > 2) {
      let dataStart = 2;
      for (let i = 0; i < Math.min(5, raw.collabs.length); i++) {
        if (raw.collabs[i][0] && String(raw.collabs[i][0]).startsWith('CO-')) { dataStart = i; break; }
      }
      const rows = raw.collabs.slice(dataStart).filter(r => r[0] && String(r[0]).startsWith('CO-'));
      COLLABS_DATA.length = 0;
      rows.forEach(r => {
        COLLABS_DATA.push({
          id: String(r[0]).trim(), name: String(r[1]||'').trim(),
          loc: String(r[2]||'').trim(), type: String(r[3]||'').trim(),
          met: parseDOB(r[4]), summary: String(r[5]||'').trim(),
          action: String(r[6]||'').trim(), lastTouch: String(r[7]||'').trim(),
          platform: String(r[8]||'').trim(), notes: String(r[9]||'').trim(),
        });
      });
    }

    const POLICY_REASSIGN = {'83445024':'SC-0047','80411596':'SC-0047','83609445':'SC-0060'};
    const _today = new Date(); _today.setHours(0,0,0,0);
    function calcYP(inception, freq, maxPay) {
      if (!inception || freq==='Single') return 1;
      const inc = new Date(inception); if(isNaN(inc)) return 1;
      let paid=0, d=new Date(inc);
      while(d<=_today && paid<20){paid++; try{d.setFullYear(d.getFullYear()+1);}catch(e){break;}}
      return maxPay ? Math.min(paid,maxPay) : paid;
    }
    const aumMap = {};
    POLICIES_DATA.forEach(p => {
      let cid = p.clientId==='CIMB' ? (POLICY_REASSIGN[p.polId]||null) : p.clientId;
      if(!cid) return;
      aumMap[cid] = (aumMap[cid]||0) + p.ap * calcYP(p.inception, p.freq, p.maxPay);
    });
    if(!CLIENTS_DATA.find(c=>c.id==='SC-0060'))
      CLIENTS_DATA.push({id:'SC-0060',name:'Wang Jian',dob:'',age:null,gender:'Male',nationality:'China',mobile:'',email:'',address:'',area:'',aum:0,cat:'C4',notes:'CIMB bank policy holder — Singlife FLI2 $1M single premium',lastContact:'',nextAction:'',ig:'',fb:'',linkedin:'',wa:''});
    CLIENTS_DATA.forEach(c => { const a=Math.round(aumMap[c.id]||0); c.aum=a; c.cat=a>=200000?'C1':a>=100000?'C2':a>=50000?'C3':'C4'; });
    // ── Parse CIMB Pipeline
    if (raw.cimb && raw.cimb.length > 2) {
      let dataStart = 0;
      for (let i = 0; i < Math.min(6, raw.cimb.length); i++) {
        if (raw.cimb[i][0] && String(raw.cimb[i][0]).startsWith('CM-')) { dataStart = i; break; }
      }
      const rows = raw.cimb.slice(dataStart).filter(r => r[0] && String(r[0]).startsWith('CM-'));
      CIMB_DATA.length = 0;
      rows.forEach(r => {
        CIMB_DATA.push({
          id:        String(r[0]).trim(),
          name:      String(r[1]||'').trim(),
          phone:     String(r[2]||'').trim(),
          email:     String(r[3]||'').trim(),
          category:  String(r[4]||'').trim(),
          hint:      String(r[5]||'').trim(),
          relationship: String(r[6]||'').trim(),
          lastNudge: String(r[7]||'').trim(),
          notes:     String(r[8]||'').trim(),
          unlockDate:'2027-03-03',
          converted: String(r[10]||'No').trim(),
        });
      });
    }
    // ── Parse Interactions
    if (raw.interactions && raw.interactions.length > 1) {
      let dataStart = 0;
      for (let i = 0; i < Math.min(3, raw.interactions.length); i++) {
        if (raw.interactions[i][0] && String(raw.interactions[i][0]) !== 'Timestamp') { dataStart = i; break; }
        if (raw.interactions[i][0] === 'Timestamp') { dataStart = i + 1; break; }
      }
      INTERACTIONS_DATA.length = 0;
      raw.interactions.slice(dataStart).forEach(r => {
        if (!r[2]) return; // skip if no person ID
        INTERACTIONS_DATA.push({
          ts:              String(r[0]||'').trim(),
          date:            String(r[1]||'').trim(),
          personId:        String(r[2]||'').trim(),
          personName:      String(r[3]||'').trim(),
          personType:      String(r[4]||'').trim(),
          interactionType: String(r[5]||'').trim(),
          direction:       String(r[6]||'').trim(),
          notes:           String(r[7]||'').trim(),
          nextFollowup:    String(r[8]||'').trim(),
          nextAction:      String(r[9]||'').trim(),
        });
      });
    }
    document.getElementById('hClientsCount').textContent = CLIENTS_DATA.length;
} // end parseSheetData

// ── HOME ──────────────────────────────────────────────────────────────────
function renderHome() {

      </div>`;
    document.getElementById('hClientsCount').textContent = '—';
    document.getElementById('hAUMTotal').textContent = '—';
    return;
  }
  try {
  const today = new Date(); today.setHours(0,0,0,0);

  // Helper: safe birthday age text
  function bdayAgeText(dob) {
    try {
      const bd = new Date(dob);
      if (isNaN(bd)) return '';
      const thisYearBday = new Date(today.getFullYear(), bd.getMonth(), bd.getDate());
      const hasPassed = thisYearBday < today;
      const currentAge = today.getFullYear() - bd.getFullYear() - (hasPassed ? 0 : 1);
      const turnsAge = currentAge + 1;
      return `${bd.toLocaleDateString('en-GB',{day:'numeric',month:'long'})} · Age ${currentAge} → ${turnsAge}`;
    } catch(e) { return ''; }
  }

  const bdayAlerts = CLIENTS_DATA.filter(c=>c.dob).map(c=>({...c,days:daysUntilBday(c.dob)})).filter(c=>c.days!=null&&c.days<=30).sort((a,b)=>a.days-b.days);
  // Guard: ensure product is always a string before calling .includes()
  const cgAlerts = POLICIES_DATA.filter(p=>String(p.product||'').includes('Flexi Life Income II')).map(p=>{
    const cg = cgDate(p.inception);
    if (!cg || isNaN(cg)) return null;
    const days = Math.round((cg-today)/86400000);
    return {...p, cgDate:cg, daysToC:days};
  }).filter(p=>p&&p.daysToC>0&&p.daysToC<=180).sort((a,b)=>a.daysToC-b.daysToC);

  const premDue = POLICIES_DATA.filter(p=>!isFullyPaid(p)&&p.freq!=='Single').map(p=>{
    const next = nextPremiumDate(p.inception, p.freq);
    if (!next || isNaN(next)) return null;
    const days = Math.round((next-today)/86400000);
    return {...p, nextDate:next, daysToP:days};

  // Update header alerts
  document.getElementById('hBdayAlert').textContent = bdayAlerts.length ? `🎂 ${bdayAlerts.length} bdays` : '';
  document.getElementById('hCGAlert').textContent = cgAlerts.length ? `🛡 ${cgAlerts.length} CG alerts` : '';
  const totalAUM = CLIENTS_DATA.reduce((s,c)=>s+(c.aum||0),0);
  document.getElementById('hAUMTotal').textContent = 'SGD '+fmtK(totalAUM);
  document.getElementById('hClientsCount').textContent = CLIENTS_DATA.length;

  let html = '';

  // BIRTHDAYS
  if (bdayAlerts.length) {

            <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
              ${tag(c.cat, catColor(c.cat))}
              ${c.mobile?`<a href="https://wa.me/65${c.mobile}" style="text-decoration:none">${tag('💬 WhatsApp','var(--green)')}</a>`:''}

          </div>
          <div style="text-align:right">
            <div class="badge" style="color:${urgent?'var(--red)':'var(--amber)'}">${c.days===0?'TODAY':c.days+'d'}</div>
          </div>
        </div>
      </div>`;
    });
  }

  // CAPITAL GUARANTEE ALERTS
  if (cgAlerts.length) {
    html += `<div class="section-title">🛡 Capital Guarantee — Approaching 3 Years</div>`;
    cgAlerts.forEach(p => {
      const urgent = p.daysToC <= 60;
      const cgStr = (!p.cgDate||isNaN(p.cgDate)) ? '—' : p.cgDate.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
      html += `<div class="alert-card ${urgent?'alert-red':'alert-teal'}">
        <div class="row">

          </div>
          <div style="text-align:right">
            <div class="badge" style="color:${urgent?'var(--red)':'var(--teal)'}">${p.daysToC}d</div>
            <div class="sub">to CG</div>
          </div>
        </div>
      </div>`;
    });
  }

  // PREMIUMS DUE
  if (premDue.length) {
    html += `<div class="section-title">⚡ Premiums Due — Next 90 Days</div>`;
    premDue.forEach(p => {
      const key = p.polId;
      const done = followedUp[key];
      const urgent = p.daysToP <= 30;
      const prod = String(p.product||'');
      const dueStr = (!p.nextDate||isNaN(p.nextDate)) ? '—' : p.nextDate.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
      html += `<div class="alert-card ${done?'followed-up':urgent?'alert-red':'alert-amber'}" id="prem_${key}">
        <div class="row">
          <div class="col" style="flex:1">
            <div class="name" style="font-size:14px">${p.client}</div>

            <div class="sub">Due: ${dueStr}</div>

          </div>
        </div>
      </div>`;
    });
  }

  if (!bdayAlerts.length && !cgAlerts.length && !premDue.length) {
    html += `<div class="empty">✅ All clear today — nothing urgent</div>`;
  }

  // 60-day follow-up overdue
  const overdue = CLIENTS_DATA.filter(c=>daysSinceFollowUp(c.id)>=60)
    .sort((a,b)=>daysSinceFollowUp(b.id)-daysSinceFollowUp(a.id)).slice(0,10);
  if (overdue.length) {
    html += `<div class="section-title" style="margin-top:18px">📅 Follow-up Overdue (60+ days)</div>`;
    overdue.forEach(c => {
      const d = daysSinceFollowUp(c.id);
      html += `<div class="alert-card alert-amber" style="cursor:pointer" onclick="openClient('${c.id}')">
        <div class="row">
          <div class="col">

            <div class="sub">${c.cat} · ${d===999?'Never contacted':d+'d ago'}</div>
            ${c.mobile?`<a href="https://wa.me/65${c.mobile}" onclick="event.stopPropagation()" style="text-decoration:none;margin-top:4px;display:inline-block"><span class="tag" style="color:var(--green);border-color:#22c55e44;background:#22c55e15;font-size:10px">💬 WhatsApp</span></a>`:''}
          </div>
          <div class="badge" style="color:var(--amber);font-size:16px">${d===999?'!':d+'d'}</div>
        </div>

  document.getElementById('tab-home').innerHTML = html;
  } catch(renderErr) {
    console.error('renderHome crashed:', renderErr);
    document.getElementById('tab-home').innerHTML = `
      <div style="text-align:center;padding:40px 24px">
        <div style="font-size:32px;margin-bottom:12px">⚠️</div>

function renderClientList() {
  const q = clientSearch.toLowerCase();
  const list = CLIENTS_DATA.filter(c=>{
    if (clientFilter!=='All'&&c.cat!==clientFilter) return false;
    if (q&&!c.name.toLowerCase().includes(q)&&!c.id.toLowerCase().includes(q)) return false;
    return true;
  });
  const bdays = list.map(c=>({...c,days:daysUntilBday(c.dob)})).sort((a,b)=>(b.days===null?-1:a.days===null?1:0)||(a.days-b.days));

  let html = `<div class="sub" style="margin-bottom:8px">${list.length} clients</div>`;
  list.forEach(c => {
    const days = daysUntilBday(c.dob);
    const bdayTag = days!==null&&days<=30 ? `${tag(days===0?'🎂 TODAY':`🎂 ${days}d`,days<=7?'var(--red)':'var(--amber)')}` : '';
    html += `<div class="card card-tap" onclick="openClient('${c.id}')">
      <div class="row">
        <div class="col" style="flex:1;min-width:0">
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            <div class="name">${c.name}</div>
            ${bdayTag}
          </div>
          <div class="sub" style="margin-top:3px">${c.id} · Age ${c.dob?new Date().getFullYear()-new Date(c.dob).getFullYear():' —'}</div>
          <div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap">
            ${tag(c.cat,catColor(c.cat))}
            ${tag(fmt(c.aum),'var(--gold)')}
            ${POLICIES_DATA.filter(p=>p.clientId===c.id).map(p=>tag(p.insurer,insurerColor(p.insurer))).filter((v,i,a)=>a.findIndex(x=>x===v)===i).join('')}
          </div>
        </div>
        <div style="color:var(--muted);font-size:18px">›</div>
      </div>
    </div>`;
  });
  document.getElementById('clientList').innerHTML = html;
}

function openClient(id) {
  const c = CLIENTS_DATA.find(x=>x.id===id);
  if (!c) return;
  const policies = POLICIES_DATA.filter(p=>p.clientId===id);
  const today = new Date(); today.setHours(0,0,0,0);
  const days = daysUntilBday(c.dob);

  document.getElementById('detailTitle').textContent = c.name;
  document.getElementById('detailSub').textContent = `${c.id} · ${c.nationality||'—'} · ${c.dob?`DOB ${c.dob} · Age ${new Date().getFullYear()-new Date(c.dob).getFullYear()}`:'DOB unknown'}`;
  document.getElementById('detailTags').innerHTML = [
    tag(c.cat, catColor(c.cat)),
    tag(fmt(c.aum)+' AUM','var(--gold)'),
    days!==null&&days<=30?tag(days===0?'🎂 TODAY':`🎂 ${days}d`,days<=7?'var(--red)':'var(--amber)'):'',
  ].filter(Boolean).join('');

  let body = '';

  // Contact actions
  if (c.mobile) {
    body += `<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <a href="tel:+65${c.mobile}" class="action-btn btn-teal" style="text-decoration:none">📞 Call</a>
      <a href="https://wa.me/65${c.mobile}" class="action-btn btn-green" style="text-decoration:none">💬 WhatsApp</a>
      ${c.email?`<a href="mailto:${c.email}" class="action-btn btn-ghost" style="text-decoration:none">✉️ Email</a>`:''}
    </div>`;
  }

  // Info grid
  body += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
    ${[['Mobile',c.mobile||'—'],['Email',c.email||'—'],['Gender',c.gender||'—'],['Nationality',c.nationality||'—'],['Address',c.address||'—'],['Area',c.area||'—']].map(([k,v])=>`<div style="background:var(--surface2);border-radius:8px;padding:10px"><div class="sub">${k}</div><div style="font-size:12px;margin-top:2px;color:var(--text)">${v}</div></div>`).join('')}
  </div>`;

  // Policies
  body += `<div class="section-title">Policies (${policies.length})</div>`;
  policies.forEach(p => {
    const fp = isFullyPaid(p);
    const isCGProd = p.product.includes('Flexi Life Income II');
    const cg = isCGProd ? cgDate(p.inception) : null;
    const daysToC = cg ? Math.round((cg-today)/86400000) : null;
    const next = fp || p.freq==='Single' ? null : nextPremiumDate(p.inception,p.freq);
    const daysToP = next ? Math.round((next-today)/86400000) : null;
    body += `<div class="policy-row" style="border-color:${insurerColor(p.insurer)}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;color:var(--text)">${p.insurer} — ${p.product}</div>
          <div class="sub" style="margin-top:2px">Policy ${p.polId}</div>
        </div>
        ${tag(fp?'✓ Paid':p.status,'var(--green)')}
      </div>
      <div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap">
        <div><div class="sub">Annual Premium</div><div class="money" style="font-size:13px">${fmt(p.ap)}</div></div>
        ${p.sa?`<div><div class="sub">Sum Assured</div><div style="font-size:12px">${fmt(p.sa)}</div></div>`:''}
        <div><div class="sub">Inception</div><div style="font-size:12px">${p.inception}</div></div>
        <div><div class="sub">Frequency</div><div style="font-size:12px">${p.freq}</div></div>
      </div>
      ${isCGProd?`<div style="margin-top:8px;padding:6px 8px;background:#0a1520;border-radius:6px">
        <div style="font-size:11px;color:${daysToC!==null&&daysToC<=0?'var(--green)':daysToC!==null&&daysToC<=180?'var(--amber)':'var(--muted)'}">
          🛡 Capital Guarantee: ${cg?cg.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):''} 
          ${daysToC!==null?daysToC<=0?'✓ Guaranteed':`(${daysToC} days)`:''} 
          · <span style="color:var(--amber);font-size:10px">⚠ Verify backdated date</span>
        </div>
      </div>`:''}
      ${daysToP!==null?`<div style="margin-top:6px;font-size:11px;color:${daysToP<=30?'var(--red)':'var(--amber)'}">
        ⚡ Next premium: ${next.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})} (${daysToP}d)
      </div>`:''}
    </div>`;
  });

  document.getElementById('detailBody').innerHTML = body;
  document.getElementById('detailOverlay').classList.add('open');
  document.getElementById('detailOverlay').scrollTop = 0;

  // ── Portfolio Pie Chart ───────────────────────────────────────────────
  const nb = document.getElementById('detailBody');
  if (nb && policies.length > 0) {
    // Calculate AUM per insurer for this client
    const today2 = new Date(); today2.setHours(0,0,0,0);
    const REASSIGN = {'83445024':'SC-0047','80411596':'SC-0047','83609445':'SC-0060'};
    const insurerAUM = {};
    policies.forEach(p => {
      let yp = (p.freq==='Single'||!p.inception) ? 1 : (() => {
        let paid=0, d=new Date(p.inception);
        while(d<=today2&&paid<20){paid++;try{d.setFullYear(d.getFullYear()+1);}catch(e){break;}}
        return p.maxPay ? Math.min(paid,p.maxPay) : paid;
      })();
      const aum = Math.round(p.ap * yp);
      insurerAUM[p.insurer] = (insurerAUM[p.insurer]||0) + aum;
    });
    const totalAUM = Object.values(insurerAUM).reduce((a,b)=>a+b,0);
    if (totalAUM > 0) {
      const colors = {'Singlife':'#2A9D8F','Income':'#E9C46A','FWD':'#E76F51','Manulife':'#A78BFA','Other':'#60A5FA'};
      const entries = Object.entries(insurerAUM).sort((a,b)=>b[1]-a[1]);
      // SVG donut
      const size = 130, cx=size/2, cy=size/2, r=48, inner=28;
      let startAngle = -Math.PI/2;
      let slices = '';
      entries.forEach(([ins,aum]) => {
        const angle = (aum/totalAUM)*Math.PI*2;
        const endAngle = startAngle + angle;
        const x1=cx+r*Math.cos(startAngle), y1=cy+r*Math.sin(startAngle);
        const x2=cx+r*Math.cos(endAngle), y2=cy+r*Math.sin(endAngle);
        const ix1=cx+inner*Math.cos(startAngle), iy1=cy+inner*Math.sin(startAngle);
        const ix2=cx+inner*Math.cos(endAngle), iy2=cy+inner*Math.sin(endAngle);
        const largeArc = angle > Math.PI ? 1 : 0;
        const col = colors[ins]||colors['Other'];
        slices += `<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${largeArc},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${ix2.toFixed(1)},${iy2.toFixed(1)} A${inner},${inner} 0 ${largeArc},0 ${ix1.toFixed(1)},${iy1.toFixed(1)} Z" fill="${col}" opacity="0.9"/>`;
        startAngle = endAngle;
      });
      const legend = entries.map(([ins,aum])=>`
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <div style="width:10px;height:10px;border-radius:2px;background:${colors[ins]||colors['Other']};flex-shrink:0"></div>
          <div style="font-size:11px;color:var(--text)">${ins}</div>
          <div style="font-size:11px;color:var(--muted);margin-left:auto">${Math.round(aum/totalAUM*100)}% · ${fmt(aum)}</div>
        </div>`).join('');
      const pieSection = document.createElement('div');
      pieSection.innerHTML = `<div class="section-title">Portfolio Breakdown</div>

function renderPolList() {
  const today = new Date(); today.setHours(0,0,0,0);

    if (q&&!p.client.toLowerCase().includes(q)&&!p.polId.toLowerCase().includes(q)&&!p.product.toLowerCase().includes(q)) return false;
    if (polFilter==='All') return true;
    if (['Singlife','Income','FWD','Manulife'].includes(polFilter)) return p.insurer===polFilter;
    if (polFilter==='Paid') return isFullyPaid(p);
    if (polFilter==='Due') { const next=nextPremiumDate(p.inception,p.freq); if(!next)return false; const d=Math.round((next-today)/86400000); return d>0&&d<=90; }
    if (polFilter==='CG') { if(!p.product.includes('Flexi Life Income II'))return false; const d=Math.round((cgDate(p.inception)-today)/86400000); return d>0&&d<=180; }

  let html = `<div class="sub" style="margin-bottom:8px">${list.length} policies</div>`;

    const daysToP = next ? Math.round((next-today)/86400000) : null;
    const daysToC = isCG ? Math.round((cgDate(p.inception)-today)/86400000) : null;
    html += `<div class="card">

      <div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;align-items:center">

        ${isCG&&daysToC!==null?`<span style="font-size:11px;color:${daysToC<=0?'var(--green)':daysToC<=60?'var(--red)':'var(--amber)'}">🛡 ${daysToC<=0?'CG ✓':daysToC+'d to CG'}</span>`:''}

// ── NOTES SYSTEM ─────────────────────────────────────────────────────────
// Notes stored in localStorage keyed by contact ID
// Format: { id: [{text, ts, type}] }
// ── INTERACTION LOG (synced to Google Sheet + localStorage cache) ─────────

function _getLocalNotes(id) {
  try { return JSON.parse(localStorage.getItem('sil_notes_'+id)||'[]'); } catch { return []; }
}
function _saveLocalNote(id, entry) {
  const notes = _getLocalNotes(id);
  notes.push(entry);
  localStorage.setItem('sil_notes_'+id, JSON.stringify(notes));
}

// Get all interactions for a person — sheet-synced first, local fallback
function getNotes(id) {
  const sheetNotes = INTERACTIONS_DATA.filter(x => x.personId === id).map(x => ({
    text: x.notes,
    ts:   x.ts || x.date,
    type: x.interactionType === 'Follow-up' ? 'followup' : 'note',
    interactionType: x.interactionType,
    direction: x.direction,
    nextFollowup: x.nextFollowup,
    nextAction: x.nextAction,
    source: 'sheet'
  }));
  const localNotes = _getLocalNotes(id).filter(n => n.source !== 'sheet');
  return [...sheetNotes, ...localNotes].sort((a,b) => new Date(a.ts) - new Date(b.ts));
}

// Log interaction — posts to sheet, caches locally
async function addNote(id, text, type='note', opts={}) {
  if (!text.trim()) return;
  const personData = CLIENTS_DATA.find(c=>c.id===id) || COLLABS_DATA.find(c=>c.id===id);
  const personType = COLLABS_DATA.find(c=>c.id===id) ? 'Collab' : 'Client';
  const today = new Date().toISOString().slice(0,10);
  const entry = {
    text: text.trim(),
    ts: new Date().toISOString(),
    type,
    interactionType: opts.interactionType || (type==='followup' ? 'Follow-up' : 'Note'),
    direction: opts.direction || 'Outbound',
    nextFollowup: opts.nextFollowup || '',
    nextAction: opts.nextAction || '',
    source: 'local'
  };
  // Save locally first (instant)
  _saveLocalNote(id, entry);
  // Post to sheet (async)
  const res = await postToSheet({
    action: 'log_interaction',
    personId: id,
    personName: personData?.name || id,
    personType,
    date: today,
    interactionType: entry.interactionType,
    direction: entry.direction,
    notes: text.trim(),
    nextFollowup: entry.nextFollowup,
    nextAction: entry.nextAction
  });
  if (res.ok) {
    // Remove local copy once confirmed saved to sheet
    const all = _getLocalNotes(id).filter(n => n.ts !== entry.ts);
    localStorage.setItem('sil_notes_'+id, JSON.stringify(all));
  }
}

function renderNotes(id, containerId) {
  const notes = getNotes(id);
  const el = document.getElementById(containerId);
  if (!el) return;
  if (!notes.length) { el.innerHTML = '<div class="sub" style="font-size:11px;padding:8px 0">No interactions logged yet.</div>'; return; }
  const typeIcon = { 'Call':'📞', 'WhatsApp':'💬', 'Email':'✉️', 'Meeting':'🤝', 'Follow-up':'✅', 'Note':'📝' };
  el.innerHTML = notes.slice().reverse().map(n=>`
    <div style="background:#060d14;border-radius:6px;padding:8px 10px;margin-bottom:6px;border-left:2px solid var(--teal)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
        <div style="font-size:11px;color:var(--muted)">${new Date(n.ts).toLocaleString('en-SG',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
        <div style="font-size:10px;color:var(--teal)">${typeIcon[n.interactionType]||'📝'} ${n.interactionType||''}</div>
      </div>
      <div style="font-size:12px;color:var(--text);line-height:1.5">${n.text}</div>
      ${n.nextFollowup ? `<div style="font-size:10px;color:var(--amber);margin-top:4px">⏰ Next follow-up: ${n.nextFollowup}</div>` : ''}
      ${n.nextAction   ? `<div style="font-size:10px;color:var(--muted);margin-top:2px">→ ${n.nextAction}</div>` : ''}
      ${n.source==='local'?'<div style="font-size:9px;color:var(--muted)">⏳ saving...</div>':''}
    </div>`).join('');
}

function submitNote(id, inputId, containerId) {
  const input = document.getElementById(inputId);
  const typeEl = document.getElementById('noteType_'+id);
  if (!input||!input.value.trim()) return;
  const intType = typeEl ? typeEl.value : 'Note';
  addNote(id, input.value, intType==='Follow-up'?'followup':'note', { interactionType: intType });
  input.value = '';
  renderNotes(id, containerId);
}

// ── 60-DAY FOLLOW-UP CHECK ────────────────────────────────────────────────
function getLastFollowUp(id) {
  const notes = getNotes(id);
  const fu = notes.filter(n=>n.type==='followup'||n.interactionType==='Follow-up');
  if (!fu.length) {
    // Fall back to lastContact from sheet
    const c = CLIENTS_DATA.find(x=>x.id===id) || COLLABS_DATA.find(x=>x.id===id);
    if (c && c.lastContact) return new Date(c.lastContact);
    return null;
  }
  return new Date(fu[fu.length-1].ts);
}
function daysSinceFollowUp(id) {
  const last = getLastFollowUp(id);
  if (!last) return 999;
  return Math.floor((new Date()-last)/86400000);
}
async function markFollowUpDone(id, note='') {
  const nf = document.getElementById('nextFollowup_'+id)?.value || '';
  const na = document.getElementById('nextAction_'+id)?.value || '';
  await addNote(id, note||'Follow-up done', 'followup', {
    interactionType: 'Follow-up',
    nextFollowup: nf,
    nextAction: na
  });
  followedUp[id] = true;
  localStorage.setItem('sil_followedup', JSON.stringify(followedUp));
  renderHome();
}

async function submitAddClient() {
  const g = id => document.getElementById(id)?.value?.trim() || '';
  const name = g('addC_name');
  if (!name) { alert('Name is required'); return; }
  const btn = document.getElementById('addC_btn');
  btn.textContent = 'Saving...'; btn.disabled = true;
  const res = await postToSheet({
    action: 'add_client',
    name, dob: g('addC_dob'), gender: g('addC_gender'),
    nationality: g('addC_nat'), mobile: g('addC_mobile'),
    email: g('addC_email'), notes: g('addC_notes'), nextAction: g('addC_action')
  });
  btn.disabled = false;
  if (res.ok) {
    alert(`✅ ${name} added as ${res.newId}. Sync to see them in your client list.`);
    document.querySelectorAll('#addClientForm input, #addClientForm textarea').forEach(el => el.value = '');
    btn.textContent = 'Add Client';
    syncData();
  } else {
    alert('Error: ' + (res.error||'Unknown error'));
    btn.textContent = 'Add Client';
  }
}

// ── EXPORT FOR CLAUDE ─────────────────────────────────────────────────────
function exportForClaude() {
  const lines = ['=== SIL NETWORK NOTES EXPORT ===', `Date: ${new Date().toLocaleString('en-SG')}`, ''];
  // Client notes
  const clientsWithNotes = CLIENTS_DATA.filter(c=>getNotes(c.id).length>0);
  if (clientsWithNotes.length) {
    lines.push('--- CLIENTS ---');
    clientsWithNotes.forEach(c=>{
      lines.push(`\n${c.name} (${c.id}):`);
      getNotes(c.id).forEach(n=>{
        lines.push(`  [${new Date(n.ts).toLocaleString('en-SG',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}] ${n.type==='followup'?'✓ Follow-up: ':''}${n.text}`);
      });
    });
  }
  // Collab notes
  const collabsWithNotes = COLLABS_DATA.filter(c=>getNotes(c.id).length>0);
  if (collabsWithNotes.length) {
    lines.push('\n--- COLLABS ---');
    collabsWithNotes.forEach(c=>{
      lines.push(`\n${c.name} (${c.id}):`);
      getNotes(c.id).forEach(n=>{
        lines.push(`  [${new Date(n.ts).toLocaleString('en-SG',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}] ${n.text}`);
      });
    });
  }
  if (lines.length<=3) { alert('No notes to export yet.'); return; }
  navigator.clipboard.writeText(lines.join('\n')).then(()=>{
    const btn = document.getElementById('exportBtn');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    btn.style.background = 'var(--green)';
    setTimeout(()=>{ btn.textContent=orig; btn.style.background='var(--purple)'; },2000);
  }).catch(()=>{ prompt('Copy this text:', lines.join('\n')); });
}
